name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (lint)
        run: npm run lint

      - name: Test (with coverage)
        # COVERAGE_NO_THRESHOLDS=1 generates lcov without enforcing the 80% thresholds
        # (existing coverage debt would otherwise fail CI). Real test failures still
        # fail this step. Codecov's patch target nudges new code toward the bar.
        run: npm run test:coverage
        env:
          COVERAGE_NO_THRESHOLDS: '1'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          # Don't fail CI if the upload hiccups; the upload is informational.
          fail_ci_if_error: false

  prod-bundle:
    name: prod-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke-test the production bundle
        run: npm run smoke:prod
