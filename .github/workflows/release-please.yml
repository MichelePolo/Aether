name: release-please

# Reads conventional commits on main, maintains a rolling "release PR" that bumps
# the version in package.json + updates CHANGELOG.md, and on merge tags the
# release and publishes a GitHub Release. No manual version bumping needed.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
